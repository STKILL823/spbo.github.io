<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY WASTELAND - Main Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background"></div>

    <div class="container">
        <!-- Левая панель -->
        <div class="left-panel">
            <div class="logo-small">MADE BY YOU</div>
            <div class="social-icons">
                <a href="#">𝕏</a>
                <a href="#">f</a>
                <a href="#">▶</a>
                <a href="#">♪</a>
            </div>
        </div>

        <!-- Центральная панель -->
        <div class="main-panel">
            <h1 class="game-title">WASTELAND<span class="radiation">.IO</span></h1>
            
            <div class="input-group">
                <input type="text" id="nickname" placeholder="ВВЕДИ НИКНЕЙМ" maxlength="16">
            </div>

            <div class="mode-select">
                <button class="mode-btn active" data-mode="survival">SURVIVAL</button>
                <button class="mode-btn" data-mode="ghoul">GHOUL MODE</button>
            </div>

            <button class="play-button" id="playBtn">
                PLAY
            </button>
        </div>

        <!-- Правая панель -->
        <div class="right-panel">
            <div class="info-box">
                <h3>HOW TO PLAY</h3>
                <p>Собирай ресурсы • Крафти • Выживай<br>
                   Берегись радиации и других игроков!</p>
            </div>

            <div class="controls">
                <h3>УПРАВЛЕНИЕ</h3>
                <div class="keys">
                    <div>WASD — Двигаться</div>
                    <div>ЛКМ — Ударить / Взаимодействовать</div>
                    <div>E — Использовать</div>
                    <div>C — Крафт</div>
                    <div>M — Карта</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
