<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devast.IO - Post-Apocalyptic Survival</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Viga&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background"></div>

    <div class="container">
        <!-- Центральная панель -->
        <div class="main-panel">
            <div class="logo">
                <span>DEVAST</span><span class="io">.IO</span>
            </div>

            <input type="text" id="nickname" placeholder="NICKNAME" maxlength="16">

            <select id="serverSelect">
                <option value="">Auto Select Server</option>
                <option value="official">Official Server</option>
                <option value="community">Community Server</option>
            </select>

            <button class="play-button" id="playBtn">PLAY</button>

            <div class="modes">
                <button class="mode-btn active">SURVIVAL</button>
                <button class="mode-btn">GHOUL MODE</button>
            </div>
        </div>

        <!-- Правая панель - Changelog -->
        <div class="right-panel">
            <div class="changelog-box">
                <h2>CHANGELOG</h2>
                <div class="changelog-content" id="changelogText">
                    <!-- Сюда вставим текст из твоего HTML -->
                </div>
                <a href="#" class="see-more">SEE MORE</a>
            </div>
        </div>

        <!-- Левая / нижняя панель - How to Play -->
        <div class="howtoplay-panel">
            <h2>HOW TO PLAY?</h2>
            <p>Eat, warm up, and survive by gathering resources, crafting items and building a shelter.<br>
               Fight other players, and beware the <span class="highlight">radiation</span>!</p>

            <h3>COMMANDS</h3>
            <div class="commands">
                <div><strong>W A S D</strong> — MOVE</div>
                <div><strong>Mouse Left</strong> — HIT / INTERACT</div>
                <div><strong>E</strong> — INTERACT</div>
                <div><strong>C</strong> — CRAFT</div>
                <div><strong>M</strong> — MAP</div>
                <div><strong>Shift</strong> — RUN</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
